<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>O'Future - Đánh giá Sản phẩm</title>
  <link rel="stylesheet" href="../shared/buyer.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">O'<span>Future</span></div>
      <nav class="nav">
        <a href="../buyer-home/index.html">Dashboard</a>
        <a href="../buyer-products/index.html">Products</a>
        <a href="../buyer-cart/index.html">Cart</a>
        <a href="../buyer-checkout/index.html">Checkout</a>
        <a href="../buyer-orders/index.html">Orders</a>
        <a href="../buyer-profile/index.html">Profile</a> 
        <a href="../buyer-contact/index.html">Contact</a>
        <a class="active" href="index.html">Reviews</a>
      </nav>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="search-box">
          <input type="text" placeholder="Tìm kiếm đánh giá...">
        </div>
        <div class="top-actions">
          <div class="icon-btn">🔔</div>
          <div class="avatar" id="topAvatar">U</div>
          <button id="logoutBtn" class="btn btn-outline" style="padding: 8px 14px; font-size: 14px;">Đăng xuất</button>
        </div>
      </div>

      <div class="page-content">
        <h1 class="page-title">Đánh giá & Phản hồi</h1>

        <div id="noOrderMessage" class="card info-card" style="display: none;">
          <p>Bạn chưa chọn đơn hàng nào để đánh giá.</p>
          <a href="../buyer-orders/index.html" class="btn btn-primary" style="display: inline-block; margin-top: 10px;">Quay lại Quản lý Đơn hàng</a>
        </div>

        <div id="reviewFormContainer" class="card review-form-card" style="display: none;">
          <h2 class="card-title">Viết đánh giá cho Đơn hàng <span id="selectedOrderId" class="highlight-text"></span></h2>
          
          <form id="reviewForm" class="form-grid">
            <div class="form-group full-width">
              <label>Chất lượng sản phẩm *</label>
              <div class="star-rating">
                <span class="star" data-rating="1">★</span>
                <span class="star" data-rating="2">★</span>
                <span class="star" data-rating="3">★</span>
                <span class="star" data-rating="4">★</span>
                <span class="star" data-rating="5">★</span>
              </div>
              <input type="hidden" id="rating" value="0">
            </div>

            <div class="form-group full-width">
              <label for="title">Tiêu đề đánh giá</label>
              <input type="text" id="title" class="form-control" placeholder="Tóm tắt trải nghiệm của bạn (Không bắt buộc)">
            </div>

            <div class="form-group full-width">
              <label for="body">Nội dung chi tiết *</label>
              <textarea id="body" class="form-control" rows="4" placeholder="Chia sẻ thêm về sản phẩm để giúp những người mua khác nhé..." required></textarea>
            </div>

            <div class="form-actions full-width">
              <button type="submit" class="btn btn-primary">Gửi Đánh Giá</button>
              <button type="button" class="btn btn-secondary" onclick="window.location.href='../buyer-orders/index.html'">Hủy</button>
            </div>
          </form>
        </div>

        <div class="card mt-20">
          <h2 class="card-title">Lịch sử đánh giá của tôi</h2>
          <div id="myReviewsList" class="reviews-list">
            </div>
        </div>
      </div>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script src="../shared/api.js"></script>
  <script src="../shared/chat-widget.js"></script><script src="script.js"></script>
</body>
</html>
