<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login</title>

<link rel="stylesheet" href="login.css">

<style>
    /* minimal reset for this file */
    :root{box-sizing:border-box}
    *,*::before,*::after{box-sizing:inherit}

    /* ==================== HEADER STYLE ==================== */
    .header-wrap {
        text-align: center;
        padding: 28px 10px 6px;
    }
    .welcome-text {
        margin: 0;
        font-size: 2em;
        font-weight: 700;
        color: #0f172a;
        white-space: nowrap;
    }
    .brand {
        display: inline-block;
        font-weight: 800;
        font-family: 'Oswald', Arial, sans-serif;
        color: transparent;
        background-image: linear-gradient(90deg,#ff3cac 0%,#ffd166 20%,#7d74ff 50%,#42e695 75%,#ff66bf 100%);
        background-size: 200% 100%;
        -webkit-background-clip: text;
        background-clip: text;
        animation: rainbow 6s linear infinite;
        position: relative;
    }
    .brand::after {
        content: attr(data-text);
        position: absolute;
        left: 0; top: 0;
        width: 100%; height: 100%;
        color: transparent;
        -webkit-background-clip: text;
        background-clip: text;
        background-image: linear-gradient(45deg,
            rgba(255,255,255,0) 0%, rgba(255,255,255,0) 40%,
            rgba(255,255,255,0.95) 48%, rgba(255,255,255,0.95) 52%,
            rgba(255,255,255,0) 60%, rgba(255,255,255,0) 100%);
        background-size: 300% 300%;
        background-position: 150% -50%;
        animation: stripeRTL 2.6s linear infinite;
    }
    @keyframes rainbow {0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
    @keyframes stripeRTL {0%{background-position:150% -50%}100%{background-position:-50% 150%}}

    /* ==================== FOOTER STYLE ==================== */
    .footer-grid {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px 16px;
        border-radius: 16px;
        background: rgba(255,255,255,0.62);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.8);
        box-shadow: 0 8px 20px rgba(19, 35, 65, 0.08);
        flex-wrap: wrap;
    }
    .footer-item {
        padding: 7px 12px;
        border-radius: 999px;
        background: rgba(255,255,255,0.72);
        border: 1px solid rgba(207, 220, 242, 0.85);
        white-space: nowrap;
        color: #475569;
        font-size: 12px;
        font-weight: 600;
    }
</style>
</head>
<body class="show-login">

<!-- HEADER INLINE -->
<div class="header-wrap">
    <h1 class="welcome-text">Welcome to <span class="brand" data-text="O'Future">O'Future</span></h1>
</div>

<main class="main-container">

    <!-- LOGO -->
    <section class="logo-panel">
        <img src="Logo.png" class="logo-image">
    </section>

    <!-- TARGET AREA -->
    <div class="target-area">
        <div id="target" class="basket" role="button" tabindex="0" 
             style="position:relative;display:inline-block">
            <img src="giohang.png" style="max-width:260px;height:auto;">
        </div>
    </div>

    <!-- LOGIN FORM -->
    <section class="login-box">
        <div class="login-title">LOGIN</div>
        
        <!-- Thêm novalidate để tắt validation mặc định của browser -->
        <form id="login-form" novalidate>
            <div class="input-group">
                <!-- Đổi thành type="text" để cho phép username không có @ -->
                <input type="text" id="email" placeholder="Email hoặc Username" required>
            </div>

            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>

            <button type="submit">Đăng nhập</button>

            <p class="switch-auth">
                Chưa có tài khoản? 
                <a href="register.html">Đăng ký ngay</a>
            </p>
        </form>
    </section>

</main>

<!-- FOOTER INLINE -->
<div class="footer-grid" aria-label="Chan trang">
    <div class="footer-item">Dich Vu Khach Hang</div>
    <div class="footer-item">O'future Viet Nam</div>
    <div class="footer-item">Thanh Toan</div>
    <div class="footer-item">Dia Chi</div>
</div>

<!-- THROW CHARACTER & MONEY BALL -->
<div id="kicker" style="position:fixed; left:6vw; bottom:12vh; width:120px; z-index:800">
    <img src="nguoinembong.png" style="width:100%;">
</div>

<div id="ball" class="projectile">
    <img src="money.png" class="ball-img">
</div>

<!-- LOGIN SCRIPT -->
<script src="login.js"></script>

</body>
</html>
