<!-- ofuture-frontend/register.html — REPLACE entire body content -->
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Register — O'Future</title>
  <link rel="stylesheet" href="register.css">
  <style>:root{box-sizing:border-box}*,*::before,*::after{box-sizing:inherit}</style>
</head>
<body>
  <iframe class="header-embed" src="header.html" title="Site Header" loading="eager"></iframe>

  <main class="main-container">
    <section class="logo-panel">
      <img src="Logo.png" alt="O'Future logo" class="logo-image">
    </section>

    <section class="register-box">
      <div class="register-title">REGISTER</div>
      <!-- FIX: Added id attributes to every input + added role select + submit id -->
      <form id="registerForm">
        <div class="input-group">
          <input type="text"     id="fullName"        placeholder="Full Name"        autocomplete="name"         required>
        </div>
        <div class="input-group">
          <input type="email"    id="email"           placeholder="Email"            autocomplete="email"        required>
        </div>
        <div class="input-group">
          <input type="text"     id="username"        placeholder="Username"         autocomplete="username"     required>
        </div>
        <div class="input-group">
          <input type="tel"      id="phone"           placeholder="Phone (optional)" autocomplete="tel">
        </div>
        <div class="input-group">
          <select id="role">
            <option value="buyer">Người mua (Buyer)</option>
            <option value="seller">Nhà cung cấp (Seller)</option>
          </select>
        </div>
        <div class="input-group">
          <input type="password" id="password"        placeholder="Password"         autocomplete="new-password" required>
        </div>
        <div class="input-group">
          <input type="password" id="confirmPassword" placeholder="Confirm Password" autocomplete="new-password" required>
        </div>

        <!-- Password requirements feedback -->
        <ul id="passwordRequirements" style="font-size:13px;list-style:none;padding:0;margin:8px 0">
          <li id="req-length"    class="unmet">✗ Ít nhất 8 ký tự</li>
          <li id="req-uppercase" class="unmet">✗ Chữ hoa</li>
          <li id="req-lowercase" class="unmet">✗ Chữ thường</li>
          <li id="req-number"    class="unmet">✗ Chữ số</li>
          <li id="req-special"   class="unmet">✗ Ký tự đặc biệt</li>
        </ul>
        <span id="confirmStatus" class="password-match-status"></span>

        <button type="submit" id="submitBtn" disabled>Đăng ký</button>
        <p class="switch-auth">Đã có tài khoản? <a href="login.html">Đăng nhập</a></p>
      </form>
    </section>
  </main>

  <iframe class="footer-embed" src="footer.html" title="Site Footer" loading="eager"></iframe>

  <!-- FIX: import api.js BEFORE register.js -->
  <script src="api.js"></script>
  <script src="register.js"></script>
</body>
</html>
